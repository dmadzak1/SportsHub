spring.application.name=user
spring.datasource.url=jdbc:mysql://localhost:3306/sporthub_facility?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password

# Automatsko kreiranje tabela na osnovu Java klasa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8080
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

security.jwt.secret=change-this-secret-key-change-this-secret-key-32chars
security.jwt.expiration-minutes=60